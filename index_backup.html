<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Item Comparer (Demo)</title>

<style>
#item-index {
  margin: 30px;
  color: white;
}

#item-index input,
#item-index select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  background: #2a2a2a;
  color: white;
  border: 1px solid #555;
  border-radius: 8px;
}

#letters button {
  padding: 12px 18px;
  margin: 4px;
  background: #1f1f1f;
  color: white;
  border: 1px solid #555;
  border-radius: 8px;
}

#itemGrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.item-card {
  background: #242424;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #444;
}

.tag {
  display: inline-block;
  padding: 4px 8px;
  border: 1px solid #777;
  border-radius: 5px;
  margin-right: 5px;
}
body {
    font-family: Arial;
    background:#1e1e1e;
    color:white;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1 {
    text-align:center;
}

.input-group {
    position: relative;
    width: 48%;
    display:inline-block;
}

input {
    width:100%;
    padding:10px;
    margin:5px;
}

button {
    padding:10px;
    margin:10px 5px;
    background:#4CAF50;
    border:none;
    color:white;
    cursor:pointer;
}

.autocomplete {
    position:absolute;
    background:#2c2c2c;
    width:100%;
    max-height:150px;
    overflow-y:auto;
}

.autocomplete div {
    padding:8px;
    cursor:pointer;
}

.autocomplete div:hover {
    background:#444;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse: collapse;
}

td, th {
    padding:10px;
    border-bottom:1px solid #444;
    text-align:center;
}

.better { color:#4CAF50; font-weight:bold; }
.worse { color:#ff4c4c; }
</style>
</head>

<body>
   
<section id="item-index">
  <input id="searchBox" placeholder="filter items...">

  <select id="typeFilter">
    <option value="">all types</option>
  </select>

  <select id="rarityFilter">
    <option value="">all rarities</option>
  </select>

  <div id="letters"></div>

  <p id="count">Loading items...</p>

  <div id="itemGrid"></div>
</section>

<div class="container">
    <h1>Minecraft Item Comparer (Demo)</h1>

    <div class="input-group">
        <input id="item1" placeholder="Search item 1">
        <div id="list1" class="autocomplete"></div>
    </div>

    <div class="input-group">
        <input id="item2" placeholder="Search item 2">
        <div id="list2" class="autocomplete"></div>
    </div>

    <br>
    <button id="compareButton" onclick="compare()" disabled>Compare</button>

    <p id="status">Loading SQL data...</p>

    <table id="table"></table>
</div>
<script>
let demoItems = [];

let selectedLetter = "";

function setupItemIndex() {
    typeFilter.innerHTML = '<option value="">all types</option>';
    rarityFilter.innerHTML = '<option value="">all rarities</option>';
  let types = [...new Set(demoItems.map(item => item.type))];
  let rarities = [...new Set(demoItems.map(item => item.rarity))];

  types.forEach(type => {
    typeFilter.innerHTML += `<option value="${type}">${type}</option>`;
  });

  rarities.forEach(rarity => {
    rarityFilter.innerHTML += `<option value="${rarity}">${rarity}</option>`;
  });

  letters.innerHTML = `<button onclick="setLetter('')">all</button>`;

  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
    letters.innerHTML += `<button onclick="setLetter('${letter}')">${letter}</button>`;
  });

  displayItems();
}

function setLetter(letter) {
  selectedLetter = letter;
  displayItems();
}

function displayItems() {
  let search = searchBox.value.toLowerCase();
  let type = typeFilter.value;
  let rarity = rarityFilter.value;

  let filtered = demoItems.filter(item =>
    item.name.toLowerCase().includes(search) &&
    (type === "" || item.type === type) &&
    (rarity === "" || item.rarity === rarity) &&
    (selectedLetter === "" || item.name.startsWith(selectedLetter))
  );

  count.innerText = `showing ${filtered.length} items`;

  itemGrid.innerHTML = "";

  filtered.forEach(item => {
    itemGrid.innerHTML += `
      <div class="item-card">
        <h3>${item.name}</h3>
        <span class="tag">${item.rarity}</span>
        <span class="tag">${item.type}</span>
      </div>
    `;
  });
}

searchBox.addEventListener("input", displayItems);
typeFilter.addEventListener("change", displayItems);
rarityFilter.addEventListener("change", displayItems);


</script>
<script>
const attributeConfig = [
    { key: "max_stack", label: "Max Stack", comparable: true },
    { key: "rarity", label: "Rarity", comparable: false },
    { key: "mining_level", label: "Mining Level", comparable: true },
    { key: "attack_damage", label: "Attack Damage", comparable: true },
    { key: "attack_speed", label: "Attack Speed", comparable: true },
    { key: "renewable", label: "Renewable", comparable: false },
    { key: "fire_resistant", label: "Fire Resistant", comparable: false },
    { key: "blast_resistant", label: "Blast Resistant", comparable: false }
];

const ITEMS = [];
const compareButton = document.getElementById("compareButton");
const statusEl = document.getElementById("status");

function formatValue(value) {
    if (value === null || value === undefined) return "N/A";
    if (typeof value === "boolean") return value ? "Yes" : "No";
    return value;
}

function splitSqlValues(valuesText) {
    const parts = [];
    let current = "";
    let inString = false;

    for (let i = 0; i < valuesText.length; i += 1) {
        const ch = valuesText[i];
        const next = valuesText[i + 1];

        if (ch === "'") {
            current += ch;
            if (inString && next === "'") {
                current += next;
                i += 1;
                continue;
            }
            inString = !inString;
            continue;
        }

        if (!inString && ch === ",") {
            parts.push(current.trim());
            current = "";
            continue;
        }

        current += ch;
    }

    if (current.length > 0) {
        parts.push(current.trim());
    }

    return parts;
}

function parseSqlToken(token) {
    if (token === "NULL") return null;
    if (token === "true") return true;
    if (token === "false") return false;
    if (token.startsWith("'") && token.endsWith("'")) {
        return token.slice(1, -1).replace(/''/g, "'");
    }
    const numeric = Number(token);
    return Number.isNaN(numeric) ? token : numeric;
}

function parseItemInsertLine(line) {
    const prefix = "INSERT INTO public.item VALUES (";
    if (!line.startsWith(prefix)) return null;

    const startIndex = line.indexOf("(");
    const endIndex = line.lastIndexOf(");");
    if (startIndex === -1 || endIndex === -1 || endIndex <= startIndex) return null;

    const valuesText = line.slice(startIndex + 1, endIndex);
    const tokens = splitSqlValues(valuesText).map(parseSqlToken);
    if (tokens.length < 32) return null;

    return {
        item_id: tokens[0],
        name: tokens[1],
        rarity: tokens[5],
        type: tokens[6],
        max_stack: tokens[10],
        renewable: tokens[11],
        mining_level: tokens[20],
        attack_damage: tokens[21],
        attack_speed: tokens[22],
        fire_resistant: tokens[30],
        blast_resistant: tokens[31]
    };
}

async function loadItemsFromSql() {
    const response = await fetch("data_creation.sql");
    if (!response.ok) {
        throw new Error("Unable to load data_creation.sql");
    }

    const sqlText = await response.text();
    const lines = sqlText.split(/\r?\n/);

    lines.forEach((line) => {
        const item = parseItemInsertLine(line.trim());
        if (item) ITEMS.push(item);
    });

    ITEMS.sort((a, b) => a.name.localeCompare(b.name));
}

function searchItems(query) {
    const lowered = query.toLowerCase();
    return ITEMS
        .filter((item) => item.name.toLowerCase().includes(lowered))
        .slice(0, 10)
        .map((item) => item.name);
}

function findItemByName(name) {
    const lowered = name.toLowerCase();
    return ITEMS.find((item) => item.name.toLowerCase() === lowered) || null;
}

function setupAutocomplete(inputId, listId) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);
    let debounceTimer = null;

    input.addEventListener("input", () => {
        const value = input.value.trim();
        list.innerHTML = "";

        if (!value) return;

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
            try {
                const matches = searchItems(value);

                matches.forEach((name) => {
                    const div = document.createElement("div");
                    div.textContent = name;
                    div.onclick = () => {
                        input.value = name;
                        list.innerHTML = "";
                    };
                    list.appendChild(div);
                });
            } catch (error) {
                list.innerHTML = "";
            }
        }, 180);
    });

    document.addEventListener("click", (event) => {
        if (!input.contains(event.target) && !list.contains(event.target)) {
            list.innerHTML = "";
        }
    });
}

async function compare() {
    if (!ITEMS.length) {
        alert("SQL data is still loading.");
        return;
    }

    const item1Name = document.getElementById("item1").value.trim();
    const item2Name = document.getElementById("item2").value.trim();

    if (!item1Name || !item2Name) {
        alert("Choose both items first.");
        return;
    }

    try {
        const item1 = findItemByName(item1Name);
        const item2 = findItemByName(item2Name);

        if (!item1 || !item2) {
            alert("One or both items were not found in SQL data.");
            return;
        }

        const table = document.getElementById("table");
        table.innerHTML = `
            <tr>
                <th>Attribute</th>
                <th>${item1.name}</th>
                <th>${item2.name}</th>
            </tr>
        `;

        attributeConfig.forEach((attribute) => {
            const raw1 = item1[attribute.key];
            const raw2 = item2[attribute.key];
            const value1 = formatValue(raw1);
            const value2 = formatValue(raw2);

            let class1 = "";
            let class2 = "";

            if (
                attribute.comparable &&
                typeof raw1 === "number" &&
                typeof raw2 === "number"
            ) {
                if (raw1 > raw2) {
                    class1 = "better";
                    class2 = "worse";
                } else if (raw2 > raw1) {
                    class2 = "better";
                    class1 = "worse";
                }
            }

            table.innerHTML += `
                <tr>
                    <td>${attribute.label}</td>
                    <td class="${class1}">${value1}</td>
                    <td class="${class2}">${value2}</td>
                </tr>
            `;
        });
    } catch (error) {
        alert("Could not compare items from SQL data.");
    }
}

setupAutocomplete("item1", "list1");
setupAutocomplete("item2", "list2");

loadItemsFromSql()
    .then(() => {
        compareButton.disabled = false;
        statusEl.textContent = `Loaded ${ITEMS.length} items from data_creation.sql`;

        demoItems = ITEMS.map(item => ({
            name: item.name,
            type: item.type || "Unknown",
            rarity: item.rarity || "Unknown"
        }));

        setupItemIndex();
    })
    .catch((error) => {
        statusEl.textContent = "Failed to load SQL data.";
        alert(`Failed to load SQL data: ${error.message}`);
    });

</script>

</body>
</html>
