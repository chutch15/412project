<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Item Comparer</title>

<style>
body {
  background:#1e1e1e;
  color:white;
  font-family: Arial;
}

#item-index {
  margin: 30px;
}

input, select {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:#2a2a2a;
  color:white;
  border:1px solid #555;
  border-radius:8px;
}

button {
  padding:10px;
  margin:5px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#letters button {
  background:#1f1f1f;
  border:1px solid #555;
}

#itemGrid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:12px;
}

.item-card {
  background:#242424;
  padding:12px;
  border-radius:10px;
  border:1px solid #444;
}

.tag {
  display:inline-block;
  padding:4px 8px;
  border:1px solid #777;
  border-radius:5px;
  margin-right:5px;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.input-group {
  position:relative;
  width:48%;
  display:inline-block;
}

.autocomplete {
  position:absolute;
  background:#2c2c2c;
  width:100%;
  max-height:150px;
  overflow-y:auto;
  z-index:10;
}

.autocomplete div {
  padding:8px;
  cursor:pointer;
}

.autocomplete div:hover {
  background:#444;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td, th {
  padding:10px;
  border-bottom:1px solid #444;
  text-align:center;
}

.better {
  color:#4CAF50;
  font-weight:bold;
}

.worse {
  color:#ff4c4c;
}
</style>
</head>

<body>



<div class="container">
  <h1>Minecraft Item Comparer</h1>

  <div class="input-group">
    <input id="item1" placeholder="Search item 1">
    <div id="list1" class="autocomplete"></div>
  </div>

  <div class="input-group">
    <input id="item2" placeholder="Search item 2">
    <div id="list2" class="autocomplete"></div>
  </div>

  <br>

  <button id="compareButton" onclick="compare()" disabled>Compare</button>

  <p id="status">Loading SQL data...</p>


  <table id="table"></table>
</div>
<section id="item-index">
  <input id="searchBox" placeholder="filter items...">

  <select id="typeFilter">
    <option value="">all types</option>
  </select>

  <select id="rarityFilter">
    <option value="">all rarities</option>
  </select>

  <div id="letters"></div>

  <p id="count">Loading items...</p>

  <div id="itemGrid"></div>
</section>
<script>
let ITEMS = [];
let selectedLetter = "";
let LIMIT = 20;

const searchBox = document.getElementById("searchBox");
const typeFilter = document.getElementById("typeFilter");
const rarityFilter = document.getElementById("rarityFilter");
const letters = document.getElementById("letters");
const count = document.getElementById("count");
const itemGrid = document.getElementById("itemGrid");
const compareButton = document.getElementById("compareButton");
const statusEl = document.getElementById("status");

const attributeConfig = [
  { key: "max_stack", label: "Max Stack", comparable: true },
  { key: "rarity", label: "Rarity", comparable: false },
  { key: "mining_level", label: "Mining Level", comparable: true },
  { key: "attack_damage", label: "Attack Damage", comparable: true },
  { key: "attack_speed", label: "Attack Speed", comparable: true },
  { key: "renewable", label: "Renewable", comparable: false },
  { key: "fire_resistant", label: "Fire Resistant", comparable: false },
  { key: "blast_resistant", label: "Blast Resistant", comparable: false }
];

function splitSqlValues(valuesText) {
  const parts = [];
  let current = "";
  let inString = false;

  for (let i = 0; i < valuesText.length; i++) {
    const ch = valuesText[i];
    const next = valuesText[i + 1];

    if (ch === "'") {
      current += ch;
      if (inString && next === "'") {
        current += next;
        i++;
        continue;
      }
      inString = !inString;
      continue;
    }

    if (!inString && ch === ",") {
      parts.push(current.trim());
      current = "";
      continue;
    }

    current += ch;
  }

  if (current.length > 0) {
    parts.push(current.trim());
  }

  return parts;
}
function getCategory(name) {
  name = name.toLowerCase();

  if (name.includes("sword")) return "Sword";
  if (name.includes("pickaxe")) return "Pickaxe";
  if (name.includes("axe")) return "Axe";
  if (name.includes("shovel")) return "Shovel";
  if (name.includes("hoe")) return "Hoe";
  if (name.includes("helmet") || name.includes("chestplate") || name.includes("leggings") || name.includes("boots")) return "Armor";
  if (name.includes("block") || name.includes("stone") || name.includes("planks") || name.includes("ore")) return "Block";
  if (name.includes("apple") || name.includes("bread") || name.includes("meat") || name.includes("food")) return "Food";
  if (name.includes("potion")) return "Potion";
  if (name.includes("ingot") || name.includes("gem") || name.includes("material")) return "Material";

  return "Misc";
}
function parseSqlToken(token) {
  if (token === "NULL") return null;
  if (token === "true") return true;
  if (token === "false") return false;

  if (token.startsWith("'") && token.endsWith("'")) {
    return token.slice(1, -1).replace(/''/g, "'");
  }

  const numeric = Number(token);
  return Number.isNaN(numeric) ? token : numeric;
}

function parseItemInsertLine(line) {
  const prefix = "INSERT INTO public.item VALUES (";
  if (!line.startsWith(prefix)) return null;

  const startIndex = line.indexOf("(");
  const endIndex = line.lastIndexOf(");");

  if (startIndex === -1 || endIndex === -1 || endIndex <= startIndex) {
    return null;
  }



  const valuesText = line.slice(startIndex + 1, endIndex);
  const tokens = splitSqlValues(valuesText).map(parseSqlToken);

  if (tokens.length < 32) return null;

  return {
    item_id: tokens[0],
    name: tokens[1],
    rarity: tokens[5],
    type: getCategory(tokens[1]),
    max_stack: tokens[10],
    renewable: tokens[11],
    mining_level: tokens[20],
    attack_damage: tokens[21],
    attack_speed: tokens[22],
    fire_resistant: tokens[30],
    blast_resistant: tokens[31]
  };
}

async function loadItemsFromSql() {
  const response = await fetch("data_creation.sql");

  if (!response.ok) {
    throw new Error("Unable to load data_creation.sql");
  }

  const sqlText = await response.text();
  const lines = sqlText.split(/\r?\n/);

  lines.forEach(line => {
    const item = parseItemInsertLine(line.trim());
    if (item) ITEMS.push(item);
  });

  ITEMS.sort((a, b) => a.name.localeCompare(b.name));

  setupItemIndex();

  compareButton.disabled = false;
  statusEl.textContent = `Loaded ${ITEMS.length} items from data_creation.sql`;
}

function setupItemIndex() {
  typeFilter.innerHTML = '<option value="">all types</option>';
  rarityFilter.innerHTML = '<option value="">all rarities</option>';

  const types = [...new Set(ITEMS.map(item => item.type))];
  const rarities = [...new Set(ITEMS.map(item => item.rarity || "Unknown"))];

  types.forEach(type => {
    typeFilter.innerHTML += `<option value="${type}">${type}</option>`;
  });

  rarities.forEach(rarity => {
    rarityFilter.innerHTML += `<option value="${rarity}">${rarity}</option>`;
  });

  letters.innerHTML = `<button onclick="setLetter('')">all</button>`;

  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
    letters.innerHTML += `<button onclick="setLetter('${letter}')">${letter}</button>`;
  });

  displayItems();
}

function setLetter(letter) {
  selectedLetter = letter;
  displayItems();
}

function displayItems() {
  const search = searchBox.value.toLowerCase();
  const type = typeFilter.value;
  const rarity = rarityFilter.value;

  const filtered = ITEMS.filter(item =>
    item.name.toLowerCase().includes(search) &&
    (type === "" || item.type === type) &&
    (rarity === "" || (item.rarity || "Unknown") === rarity) &&
    (selectedLetter === "" || item.name.startsWith(selectedLetter))
  );

  count.textContent =  `showing ${Math.min(filtered.length, LIMIT)} of ${filtered.length} items`;

  itemGrid.innerHTML = "";

  filtered.slice(0, LIMIT).forEach(item =>{
    itemGrid.innerHTML += `
      <div class="item-card">
        <h3>${item.name}</h3>
        <span class="tag">${item.rarity || "Unknown"}</span>
        <span class="tag">${item.type}</span>
      </div>
    `;
  });
}

function searchItems(query) {
  const lowered = query.toLowerCase();

  return ITEMS
    .filter(item => item.name.toLowerCase().includes(lowered))
    .slice(0, 10)
    .map(item => item.name);
}

function findItemByName(name) {
  const lowered = name.toLowerCase();

  return ITEMS.find(item => item.name.toLowerCase() === lowered) || null;
}

function setupAutocomplete(inputId, listId) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);

  input.addEventListener("input", () => {
    const value = input.value.trim();
    list.innerHTML = "";

    if (!value) return;

    const matches = searchItems(value);

    matches.forEach(name => {
      const div = document.createElement("div");
      div.textContent = name;

      div.onclick = () => {
        input.value = name;
        list.innerHTML = "";
      };

      list.appendChild(div);
    });
  });

  document.addEventListener("click", event => {
    if (!input.contains(event.target) && !list.contains(event.target)) {
      list.innerHTML = "";
    }
  });
}

function formatValue(value) {
  if (value === null || value === undefined) return "N/A";
  if (typeof value === "boolean") return value ? "Yes" : "No";
  return value;
}

function compare() {
  const item1Name = document.getElementById("item1").value.trim();
  const item2Name = document.getElementById("item2").value.trim();

  if (!item1Name || !item2Name) {
    alert("Choose both items first.");
    return;
  }

  const item1 = findItemByName(item1Name);
  const item2 = findItemByName(item2Name);

  if (!item1 || !item2) {
    alert("One or both items were not found.");
    return;
  }

  const table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Attribute</th>
      <th>${item1.name}</th>
      <th>${item2.name}</th>
    </tr>
  `;

  attributeConfig.forEach(attribute => {
    const raw1 = item1[attribute.key];
    const raw2 = item2[attribute.key];

    let class1 = "";
    let class2 = "";

    if (
      attribute.comparable &&
      typeof raw1 === "number" &&
      typeof raw2 === "number"
    ) {
      if (raw1 > raw2) {
        class1 = "better";
        class2 = "worse";
      } else if (raw2 > raw1) {
        class2 = "better";
        class1 = "worse";
      }
    }

    table.innerHTML += `
      <tr>
        <td>${attribute.label}</td>
        <td class="${class1}">${formatValue(raw1)}</td>
        <td class="${class2}">${formatValue(raw2)}</td>
      </tr>
    `;
  });
}

searchBox.addEventListener("input", displayItems);
typeFilter.addEventListener("change", displayItems);
rarityFilter.addEventListener("change", displayItems);

setupAutocomplete("item1", "list1");
setupAutocomplete("item2", "list2");

loadItemsFromSql().catch(error => {
  statusEl.textContent = "Failed to load SQL data.";
  alert(error.message);
});
</script>

</body>
</html>
