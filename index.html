<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Item Comparer (Demo)</title>

<style>
body {
    font-family: Arial;
    background:#1e1e1e;
    color:white;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1 {
    text-align:center;
}

.input-group {
    position: relative;
    width: 48%;
    display:inline-block;
}

input {
    width:100%;
    padding:10px;
    margin:5px;
}

button {
    padding:10px;
    margin:10px 5px;
    background:#4CAF50;
    border:none;
    color:white;
    cursor:pointer;
}

.autocomplete {
    position:absolute;
    background:#2c2c2c;
    width:100%;
    max-height:150px;
    overflow-y:auto;
}

.autocomplete div {
    padding:8px;
    cursor:pointer;
}

.autocomplete div:hover {
    background:#444;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse: collapse;
}

td, th {
    padding:10px;
    border-bottom:1px solid #444;
    text-align:center;
}

.better { color:#4CAF50; font-weight:bold; }
.worse { color:#ff4c4c; }
</style>
</head>

<body>

<div class="container">
    <h1>Minecraft Item Comparer (Demo)</h1>

    <div class="input-group">
        <input id="item1" placeholder="Search item 1">
        <div id="list1" class="autocomplete"></div>
    </div>

    <div class="input-group">
        <input id="item2" placeholder="Search item 2">
        <div id="list2" class="autocomplete"></div>
    </div>

    <br>
    <button onclick="compare()">Compare</button>

    <table id="table"></table>
</div>

<script>
const attributeConfig = [
    { key: "max_stack", label: "Max Stack", comparable: true },
    { key: "rarity", label: "Rarity", comparable: false },
    { key: "mining_level", label: "Mining Level", comparable: true },
    { key: "attack_damage", label: "Attack Damage", comparable: true },
    { key: "attack_speed", label: "Attack Speed", comparable: true },
    { key: "renewable", label: "Renewable", comparable: false },
    { key: "fire_resistant", label: "Fire Resistant", comparable: false },
    { key: "blast_resistant", label: "Blast Resistant", comparable: false }
];

function formatValue(value) {
    if (value === null || value === undefined) return "N/A";
    if (typeof value === "boolean") return value ? "Yes" : "No";
    return value;
}

async function searchItems(query) {
    const response = await fetch(`/api/items/search?q=${encodeURIComponent(query)}`);
    if (!response.ok) {
        throw new Error("Search request failed.");
    }
    const data = await response.json();
    return Array.isArray(data.items) ? data.items : [];
}

function setupAutocomplete(inputId, listId) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);
    let debounceTimer = null;

    input.addEventListener("input", () => {
        const value = input.value.trim();
        list.innerHTML = "";

        if (!value) return;

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
            try {
                const matches = await searchItems(value);

                matches.forEach((name) => {
                    const div = document.createElement("div");
                    div.textContent = name;
                    div.onclick = () => {
                        input.value = name;
                        list.innerHTML = "";
                    };
                    list.appendChild(div);
                });
            } catch (error) {
                list.innerHTML = "";
            }
        }, 180);
    });

    document.addEventListener("click", (event) => {
        if (!input.contains(event.target) && !list.contains(event.target)) {
            list.innerHTML = "";
        }
    });
}

async function compare() {
    const item1Name = document.getElementById("item1").value.trim();
    const item2Name = document.getElementById("item2").value.trim();

    if (!item1Name || !item2Name) {
        alert("Choose both items first.");
        return;
    }

    try {
        const response = await fetch(
            `/api/items/compare?item1=${encodeURIComponent(item1Name)}&item2=${encodeURIComponent(item2Name)}`
        );

        if (!response.ok) {
            throw new Error("Compare request failed.");
        }

        const data = await response.json();
        const item1 = data.item1;
        const item2 = data.item2;

        if (!item1 || !item2) {
            alert("One or both items were not found in SQL.");
            return;
        }

        const table = document.getElementById("table");
        table.innerHTML = `
            <tr>
                <th>Attribute</th>
                <th>${item1.name}</th>
                <th>${item2.name}</th>
            </tr>
        `;

        attributeConfig.forEach((attribute) => {
            const raw1 = item1[attribute.key];
            const raw2 = item2[attribute.key];
            const value1 = formatValue(raw1);
            const value2 = formatValue(raw2);

            let class1 = "";
            let class2 = "";

            if (
                attribute.comparable &&
                typeof raw1 === "number" &&
                typeof raw2 === "number"
            ) {
                if (raw1 > raw2) {
                    class1 = "better";
                    class2 = "worse";
                } else if (raw2 > raw1) {
                    class2 = "better";
                    class1 = "worse";
                }
            }

            table.innerHTML += `
                <tr>
                    <td>${attribute.label}</td>
                    <td class="${class1}">${value1}</td>
                    <td class="${class2}">${value2}</td>
                </tr>
            `;
        });
    } catch (error) {
        alert("Could not reach SQL API. Start the server with: node server.js");
    }
}

setupAutocomplete("item1", "list1");
setupAutocomplete("item2", "list2");

</script>

</body>
</html>
