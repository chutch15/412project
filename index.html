<script>
let items = [];

// 🔥 Load CSV
fetch("items.csv") // rename your CSV to this (important)
.then(res => res.text())
.then(text => {
    const rows = text.split("\n").map(r => r.split(","));

    const headerIndex = rows.findIndex(r =>
        r.some(cell => cell.toLowerCase().includes("item"))
    );

    const headers = rows[headerIndex].map(h => h.trim());

    items = rows.slice(headerIndex + 1)
        .filter(r => r[0] && r[0].trim() !== "")
        .map(row => {
            let obj = {};
            headers.forEach((h, i) => {
                obj[h] = (row[i] || "").trim() || "N/A";
            });
            return obj;
        });

    console.log("Loaded:", items.length);
});

// 🔍 Normalize names (this fixes "minecraft:dirt" → "dirt")
function cleanName(name) {
    return name
        .toLowerCase()
        .replace("minecraft:", "")
        .replace(/_/g, " ")
        .trim();
}

// 🔍 Get item name field dynamically
function getItemName(item) {
    return item["Item Name"] || item["Item"] || "";
}

// 🔍 Autocomplete
function setupAutocomplete(inputId) {
    const input = document.getElementById(inputId);

    const list = document.createElement("div");
    list.style.position = "absolute";
    list.style.background = "#2c2c2c";
    list.style.width = input.offsetWidth + "px";
    list.style.maxHeight = "200px";
    list.style.overflowY = "auto";
    list.style.zIndex = "999";
    input.parentNode.appendChild(list);

    input.addEventListener("input", () => {
        const value = cleanName(input.value);
        list.innerHTML = "";

        if (!value) return;

        const matches = items
            .filter(item => cleanName(getItemName(item)).includes(value))
            .slice(0, 10);

        matches.forEach(item => {
            const div = document.createElement("div");
            div.textContent = cleanName(getItemName(item));
            div.style.padding = "8px";
            div.style.cursor = "pointer";

            div.onclick = () => {
                input.value = cleanName(getItemName(item));
                list.innerHTML = "";
            };

            list.appendChild(div);
        });
    });
}

// ⚔️ Find item
function findItem(name) {
    const cleaned = cleanName(name);

    return items.find(item =>
        cleanName(getItemName(item)) === cleaned
    );
}

// ⚔️ Compare
function compare() {
    const name1 = document.getElementById("item1").value;
    const name2 = document.getElementById("item2").value;

    const item1 = findItem(name1);
    const item2 = findItem(name2);

    if (!item1 || !item2) {
        alert("Item not found — use dropdown suggestions");
        return;
    }

    const table = document.getElementById("table");
    table.innerHTML = "";

    table.innerHTML += `
        <tr>
            <th>Attribute</th>
            <th>${cleanName(getItemName(item1))}</th>
            <th>${cleanName(getItemName(item2))}</th>
        </tr>
    `;

    const keys = new Set([
        ...Object.keys(item1),
        ...Object.keys(item2)
    ]);

    keys.forEach(key => {
        let v1 = item1[key] || "N/A";
        let v2 = item2[key] || "N/A";

        let class1 = "", class2 = "";

        if (!isNaN(v1) && !isNaN(v2)) {
            if (Number(v1) > Number(v2)) {
                class1 = "better";
                class2 = "worse";
            } else if (Number(v2) > Number(v1)) {
                class2 = "better";
                class1 = "worse";
            }
        }

        table.innerHTML += `
            <tr>
                <td>${key}</td>
                <td class="${class1}">${v1}</td>
                <td class="${class2}">${v2}</td>
            </tr>
        `;
    });
}

// 🚀 Init autocomplete
setupAutocomplete("item1");
setupAutocomplete("item2");
</script>
