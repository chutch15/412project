<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Item Comparer</title>

<style>
body {
    font-family: Arial;
    background:#1e1e1e;
    color:white;
    margin:0;
}

.container {
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1 {
    text-align:center;
}

.input-group {
    position: relative;
    display: inline-block;
    width:48%;
}

input {
    padding:10px;
    margin:5px;
    width:100%;
    box-sizing:border-box;
}

button {
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    margin:10px 5px;
    cursor:pointer;
}

.autocomplete {
    position:absolute;
    background:#2c2c2c;
    width:100%;
    max-height:200px;
    overflow-y:auto;
    z-index:999;
    border-radius:6px;
}

.autocomplete div {
    padding:8px;
    cursor:pointer;
}

.autocomplete div:hover {
    background:#444;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse: collapse;
}

td, th {
    padding:10px;
    border-bottom:1px solid #444;
    text-align:center;
}

.better {
    color:#4CAF50;
    font-weight:bold;
}

.worse {
    color:#ff4c4c;
}
</style>
</head>

<body>

<div class="container">
    <h1>Minecraft Item Comparer</h1>

    <div class="input-group">
        <input id="item1" placeholder="Search item 1 (e.g. dirt)">
        <div id="list1" class="autocomplete"></div>
    </div>

    <div class="input-group">
        <input id="item2" placeholder="Search item 2 (e.g. stone)">
        <div id="list2" class="autocomplete"></div>
    </div>

    <br>
    <button onclick="compare()">Compare</button>

    <table id="table"></table>
</div>

<script>
let items = [];

// 🔥 Load CSV
fetch("MC_%20Ultimate%20List%20-%20Items.csv")
.then(res => res.text())
.then(text => {
    const rows = text.split("\n").map(r => r.split(","));

    const headerIndex = rows.findIndex(r =>
        r.some(cell => cell.toLowerCase().includes("item"))
    );

    const headers = rows[headerIndex].map(h => h.trim());

    items = rows.slice(headerIndex + 1)
        .filter(r => r[0] && r[0].trim() !== "")
        .map(row => {
            let obj = {};
            headers.forEach((h, i) => {
                obj[h] = (row[i] || "").trim() || "N/A";
            });
            return obj;
        });

    console.log("Loaded items:", items.length);
});

// 🔧 Clean item names
function cleanName(name) {
    return name
        .toLowerCase()
        .replace("minecraft:", "")
        .replace(/_/g, " ")
        .trim();
}

// 🔧 Get item name field
function getItemName(item) {
    return item["Item Name"] || item["Item"] || "";
}

// 🔍 Autocomplete
function setupAutocomplete(inputId, listId) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);

    input.addEventListener("input", () => {
        const value = cleanName(input.value);
        list.innerHTML = "";

        if (!value) return;

        const matches = items
            .filter(item => cleanName(getItemName(item)).includes(value))
            .slice(0, 10);

        matches.forEach(item => {
            const div = document.createElement("div");
            div.textContent = cleanName(getItemName(item));

            div.onclick = () => {
                input.value = cleanName(getItemName(item));
                list.innerHTML = "";
            };

            list.appendChild(div);
        });
    });

    // close dropdown on click outside
    document.addEventListener("click", (e) => {
        if (!input.contains(e.target)) {
            list.innerHTML = "";
        }
    });
}

// ⚔️ Find item
function findItem(name) {
    const cleaned = cleanName(name);

    return items.find(item =>
        cleanName(getItemName(item)) === cleaned
    );
}

// ⚔️ Compare
function compare() {
    const name1 = document.getElementById("item1").value;
    const name2 = document.getElementById("item2").value;

    const item1 = findItem(name1);
    const item2 = findItem(name2);

    if (!item1 || !item2) {
        alert("Item not found — use dropdown suggestions");
        return;
    }

    const table = document.getElementById("table");
    table.innerHTML = "";

    table.innerHTML += `
        <tr>
            <th>Attribute</th>
            <th>${cleanName(getItemName(item1))}</th>
            <th>${cleanName(getItemName(item2))}</th>
        </tr>
    `;

    const keys = new Set([
        ...Object.keys(item1),
        ...Object.keys(item2)
    ]);

    keys.forEach(key => {
        if (!key) return;

        let v1 = item1[key] || "N/A";
        let v2 = item2[key] || "N/A";

        let class1 = "", class2 = "";

        if (!isNaN(v1) && !isNaN(v2)) {
            if (Number(v1) > Number(v2)) {
                class1 = "better";
                class2 = "worse";
            } else if (Number(v2) > Number(v1)) {
                class2 = "better";
                class1 = "worse";
            }
        }

        table.innerHTML += `
            <tr>
                <td>${key}</td>
                <td class="${class1}">${v1}</td>
                <td class="${class2}">${v2}</td>
            </tr>
        `;
    });
}

// 🚀 Init
setupAutocomplete("item1", "list1");
setupAutocomplete("item2", "list2");
</script>

</body>
</html>
