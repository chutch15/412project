<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Item Comparer (Demo)</title>

<style>
body {
    font-family: Arial;
    background:#1e1e1e;
    color:white;
}

.container {
    max-width:800px;
    margin:auto;
    padding:20px;
}

.input-group {
    position: relative;
    width: 48%;
    display:inline-block;
}

input {
    width:100%;
    padding:10px;
    margin:5px;
}

button {
    padding:10px;
    margin:10px 5px;
    background:#4CAF50;
    border:none;
    color:white;
    cursor:pointer;
}

.autocomplete {
    position:absolute;
    background:#2c2c2c;
    width:100%;
    max-height:150px;
    overflow-y:auto;
}

.autocomplete div {
    padding:8px;
    cursor:pointer;
}

.autocomplete div:hover {
    background:#444;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse: collapse;
}

td, th {
    padding:10px;
    border-bottom:1px solid #444;
    text-align:center;
}

.better { color:#4CAF50; font-weight:bold; }
.worse { color:#ff4c4c; }
</style>
</head>

<body>

<div class="container">
    <h1>Minecraft Item Comparer (Demo)</h1>

    <div class="input-group">
        <input id="item1" placeholder="Search item 1">
        <div id="list1" class="autocomplete"></div>
    </div>

    <div class="input-group">
        <input id="item2" placeholder="Search item 2">
        <div id="list2" class="autocomplete"></div>
    </div>

    <br>
    <button onclick="compare()">Compare</button>

    <table id="table"></table>
</div>

<script>
// ✅ SIMPLE DATASET
const items = [
    { name: "dirt", hardness: 0.5, stack: 64 },
    { name: "stone", hardness: 1.5, stack: 64 },
    { name: "grass", hardness: 0.6, stack: 64 },
    { name: "wood", hardness: 2.0, stack: 64 },
    { name: "planks", hardness: 2.0, stack: 64 }
];

// 🔍 Autocomplete
function setupAutocomplete(inputId, listId) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);

    input.addEventListener("input", () => {
        const value = input.value.toLowerCase();
        list.innerHTML = "";

        if (!value) return;

        const matches = items.filter(i => i.name.includes(value));

        matches.forEach(item => {
            const div = document.createElement("div");
            div.textContent = item.name;

            div.onclick = () => {
                input.value = item.name;
                list.innerHTML = "";
            };

            list.appendChild(div);
        });
    });

    document.addEventListener("click", (e) => {
        if (!input.contains(e.target)) list.innerHTML = "";
    });
}

// 🔍 Find item
function findItem(name) {
    return items.find(i => i.name === name.toLowerCase());
}

// ⚔️ Compare
function compare() {
    const item1 = findItem(document.getElementById("item1").value);
    const item2 = findItem(document.getElementById("item2").value);

    if (!item1 || !item2) {
        alert("Pick items from the dropdown");
        return;
    }

    const table = document.getElementById("table");
    table.innerHTML = `
        <tr>
            <th>Attribute</th>
            <th>${item1.name}</th>
            <th>${item2.name}</th>
        </tr>
    `;

    ["hardness", "stack"].forEach(attr => {
        let v1 = item1[attr];
        let v2 = item2[attr];

        let c1="", c2="";

        if (v1 > v2) { c1="better"; c2="worse"; }
        else if (v2 > v1) { c2="better"; c1="worse"; }

        table.innerHTML += `
            <tr>
                <td>${attr}</td>
                <td class="${c1}">${v1}</td>
                <td class="${c2}">${v2}</td>
            </tr>
        `;
    });
}

// 🚀 Init
setupAutocomplete("item1", "list1");
setupAutocomplete("item2", "list2");
</script>

</body>
</html>
